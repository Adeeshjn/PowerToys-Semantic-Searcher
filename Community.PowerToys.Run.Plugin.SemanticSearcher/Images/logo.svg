<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Document background gradient -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D88FF" />
      <stop offset="100%" stop-color="#0052CC" />
    </linearGradient>
    
    <!-- Magnifying glass gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4DD0E1" />
      <stop offset="100%" stop-color="#00ACC1" />
    </linearGradient>
    
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Document Base -->
  <rect x="48" y="24" width="130" height="170" rx="12" fill="url(#docGrad)" filter="url(#shadow)"/>
  
  <!-- Folded Corner Base (Shadow) -->
  <polygon points="178,24 178,64 138,24" fill="#003D99" opacity="0.6"/>
  
  <!-- Folded Corner Flap -->
  <polygon points="138,24 138,64 178,64" fill="#66B3FF" />

  <!-- Top Line -->
  <rect x="70" y="80" width="85" height="8" rx="4" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- Semantic vectors (nodes connecting concepts) -->
  <circle cx="80" cy="115" r="6" fill="#00FFCC" />
  <circle cx="115" cy="105" r="4" fill="#FFFFFF" />
  <circle cx="140" cy="125" r="5" fill="#FFFFFF" />
  <line x1="80" y1="115" x2="115" y2="105" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <line x1="115" y1="105" x2="140" y2="125" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  
  <!-- Bottom Line -->
  <rect x="70" y="150" width="60" height="8" rx="4" fill="#FFFFFF" opacity="0.8"/>

  <!-- Magnifying Glass Ring -->
  <circle cx="155" cy="155" r="48" fill="none" stroke="url(#glassGrad)" stroke-width="14" filter="url(#shadow)"/>
  
  <!-- Magnifying Glass Handle -->
  <line x1="190" y1="190" x2="225" y2="225" stroke="#00838F" stroke-width="16" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="190" y1="190" x2="225" y2="225" stroke="#00BCD4" stroke-width="8" stroke-linecap="round" />
  
  <!-- Glass Reflection -->
  <path d="M 125 125 A 48 48 0 0 1 175 118 A 40 40 0 0 0 135 150 Z" fill="#FFFFFF" opacity="0.2"/>

  <!-- AI Sparkles -->
  <path d="M 185 105 Q 190 120 205 125 Q 190 130 185 145 Q 180 130 165 125 Q 180 120 185 105 Z" fill="#FFC107" filter="url(#shadow)"/>
  <path d="M 220 85 Q 223 93 230 95 Q 223 97 220 105 Q 217 97 210 95 Q 217 93 220 85 Z" fill="#FFE082" />
</svg>
